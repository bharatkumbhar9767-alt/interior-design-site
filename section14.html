<!-- =========================================
     SECTION 14: DISCOVERY FORM
     ========================================= -->
<style>
  .s14-form { position: relative; padding: 5vh 5vw 0vh 5vw; background: var(--cream); display: flex; flex-direction: column; overflow: hidden; min-height: 100vh; }
  .s14-vline { position: absolute; left: 46px; top: 0; bottom: 0; width: 1px; background: linear-gradient(to bottom, rgba(180,144,79,0.35) 0%, rgba(180,144,79,0.35) 40%, rgba(180,144,79,0.0) 47%, rgba(180,144,79,0.0) 53%, rgba(180,144,79,0.35) 60%, rgba(180,144,79,0.35) 100%); z-index: 4; pointer-events: none; }
  .s14-vertical-text { position: absolute; left: 46px; top: 50%; transform: translateX(-50%) translateY(-50%) rotate(-90deg); transform-origin: center center; font-size: 8px; letter-spacing: 0.36em; color: var(--dark); font-weight: 200; text-transform: uppercase; white-space: nowrap; opacity: 0.55; background: var(--cream); padding: 2px 10px; z-index: 10; }
  
  .s14-center-line { position: absolute; left: 50%; top: 5vh; bottom: 100px; width: 1px; background: rgba(180,144,79,0.25); z-index: 0; }
  .s14-center-star { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: var(--cream); padding: 10px 0; z-index: 1; }
  .s14-center-star svg { width: 12px; height: 12px; fill: var(--gold); }
  
  .s14-content { position: relative; z-index: 2; width: 100%; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; flex: 1; }
  
  .s14-split { display: flex; align-items: stretch; margin-top: 5vh; flex: 1; margin-bottom: 80px; }
  
  .s14-left { flex: 1; padding-right: 5vw; display: flex; flex-direction: column; justify-content: center; }
  .s14-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(48px, 6vw, 76px); line-height: 1.1; color: var(--dark); font-weight: 400; margin-bottom: 24px; }
  .s14-title span { color: var(--gold); font-style: italic; }
  .s14-desc { font-size: 15px; line-height: 1.6; color: var(--mid); margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid rgba(180,144,79,0.3); max-width: 400px; }
  .s14-img-wrap { width: 100%; max-width: 450px; border-radius: 12px; overflow: hidden; margin-top: auto; }
  .s14-img-wrap img { width: 100%; display: block; object-fit: cover; }
  
  .s14-right { flex: 1; padding-left: 5vw; display: flex; flex-direction: column; justify-content: center; }
  .s14-form-header { text-align: center; margin-bottom: 40px; }
  .s14-form-title { font-size: 11px; letter-spacing: 0.25em; color: var(--dark); text-transform: uppercase; font-weight: 600; display: inline-flex; align-items: center; gap: 16px; }
  .s14-form-title::before, .s14-form-title::after { content: ''; width: 30px; height: 1px; background: rgba(180,144,79,0.5); }
  
  .s14-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .s14-form-group { position: relative; }
  .s14-form-group.full { grid-column: 1 / -1; }
  
  .s14-input { width: 100%; background: transparent; border: 1px solid rgba(180,144,79,0.25); border-radius: 6px; padding: 18px 20px 18px 46px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--dark); transition: all 0.3s ease; box-sizing: border-box; outline: none; }
  .s14-input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(180,144,79,0.05); }
  .s14-input::placeholder { color: var(--mid); opacity: 0.7; }
  
  textarea.s14-input { padding-top: 18px; min-height: 120px; resize: vertical; }
  
  .s14-icon { position: absolute; left: 18px; top: 18px; width: 16px; height: 16px; stroke: var(--mid); fill: none; stroke-width: 1.5; opacity: 0.7; pointer-events: none; transition: stroke 0.3s ease; }
  .s14-input:focus + .s14-icon { stroke: var(--gold); opacity: 1; }
  .s14-select-arrow { position: absolute; right: 18px; top: 18px; width: 14px; height: 14px; stroke: var(--mid); fill: none; stroke-width: 1.5; pointer-events: none; }
  
  select.s14-input { appearance: none; -webkit-appearance: none; cursor: pointer; }
  
  .s14-submit-btn { width: 100%; background: var(--gold); color: #fff; border: none; border-radius: 4px; padding: 20px; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 30px; }
  .s14-submit-btn:hover { background: #96763f; box-shadow: 0 10px 20px rgba(180,144,79,0.2); }
  .s14-submit-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 1.5; transition: transform 0.3s ease; }
  .s14-submit-btn:hover svg { transform: translateX(5px); }
  
  .s14-note { text-align: center; font-size: 11px; color: var(--mid); margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .s14-note svg { width: 14px; height: 14px; stroke: var(--mid); fill: none; stroke-width: 1.5; }
  
  @media(max-width: 900px) { .s14-split { flex-direction: column; gap: 60px; } .s14-center-line, .s14-center-star { display: none; } .s14-left, .s14-right { padding: 0; } .s14-form-grid { grid-template-columns: 1fr; } }
</style>

          <div class="s14-form-group">

  <div class="s4-bottom-arch"><svg class="s4-arch-svg" viewBox="0 0 1000 100" preserveAspectRatio="none"><path d="M0,100 L0,70 Q250,110 500,10 Q750,110 1000,70 L1000,100 Z" fill="#111" stroke="rgba(180,144,79,0.5)" stroke-width="2" vector-effect="non-scaling-stroke" /></svg><div class="s4-arch-decor"><svg class="s4-arrow" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg><div class="s4-arch-star"><svg viewBox="0 0 24 24"><path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5Z" /></svg></div><svg class="s4-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></div></div>
